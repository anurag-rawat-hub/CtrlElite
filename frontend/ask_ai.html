<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask AI · AquaYield</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">
  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="dark-sidebar">
    <div class="brand-section">
      <span class="brand-name">AQUAYIELD</span>
      <span class="brand-sub">Platform</span>
    </div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">⚲ Overview</a>
      <a href="dashboard.html" class="nav-link">𖤓 Live Dashboard</a>
      <a href="ask_ai.html" class="nav-link active">✧ Ask AI</a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="brand" style="flex-direction:row;align-items:center;">
        <span class="brand-sub" style="font-size:0.9rem;color:var(--text-pri);">AI Agrobot</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">☀</button>
      </div>
    </header>

    <!-- Chat Interface -->
    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-bubble bot">
          <strong>AI:</strong> Hello! I am your AI Agronomist. Let me know if you would like me to analyze the current sensor data or if you have any questions about your crop yield!
        </div>
      </div>
      
      <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your message or click 'Get Current Advice'..." autocomplete="off">
        <button type="button" id="quick-advice-btn" class="chat-send-btn" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-sec);padding:0 15px;" title="Get advice based on current live data">
          💡 Get Live Advice
        </button>
        <button type="button" id="chat-send-btn" class="chat-send-btn">Send</button>
      </div>
    </div>
  </main>
</div>

<script>
  const API_BASE = "http://127.0.0.1:8000/api";
  const messagesDiv = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send-btn');
  const quickAdviceBtn = document.getElementById('quick-advice-btn');
  const themeToggle = document.getElementById('theme-toggle');

  // ── Theme Toggle ──
  if (themeToggle) {
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'light') {
        document.documentElement.removeAttribute('data-theme');
        themeToggle.innerText = '☀';
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggle.innerText = '🌙';
        localStorage.setItem('theme', 'light');
      }
    });

    // Load saved theme
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      themeToggle.innerText = '🌙';
    }
  }

  function appendMessage(text, isUser) {
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${isUser ? 'user' : 'bot'}`;
    
    // Parse markdown briefly
    let htmlText = text.replace(/\n/g, '<br>');
    htmlText = htmlText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    bubble.innerHTML = isUser ? `<strong>You:</strong><br>${htmlText}` : `<strong>AI:</strong><br>${htmlText}`;
    messagesDiv.appendChild(bubble);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function getLiveAdvice(e) {
    if (e) e.preventDefault();
    quickAdviceBtn.disabled = true;
    sendBtn.disabled = true;
    appendMessage("Fetching live sensor data and running AI analysis...", true);
    
    // Loading bubble
    const loadingId = 'loading-' + Date.now();
    const loader = document.createElement('div');
    loader.className = 'chat-bubble bot';
    loader.id = loadingId;
    loader.innerHTML = '<strong>AI:</strong> ... analyzing ...';
    messagesDiv.appendChild(loader);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
      const res = await fetch(`${API_BASE}/advice/`);
      const data = await res.json();
      
      document.getElementById(loadingId).remove();

      if (!res.ok) throw new Error(data.error || "Unknown error connecting to AI.");
      
      appendMessage(data.advice, false);
    } catch (err) {
      if (document.getElementById(loadingId)) document.getElementById(loadingId).remove();
      appendMessage(`Error: ${err.message}`, false);
    } finally {
      quickAdviceBtn.disabled = false;
      sendBtn.disabled = false;
    }
  }

  quickAdviceBtn.addEventListener('click', getLiveAdvice);

  sendBtn.addEventListener('click', async (e) => {
    if (e) e.preventDefault();
    const val = chatInput.value.trim();
    if(!val) return;
    appendMessage(val, true);
    chatInput.value = '';
    
    sendBtn.disabled = true;
    quickAdviceBtn.disabled = true;

    const loadingId = 'loading-' + Date.now();
    const loader = document.createElement('div');
    loader.className = 'chat-bubble bot';
    loader.id = loadingId;
    loader.innerHTML = '<strong>AI:</strong> ... thinking ...';
    messagesDiv.appendChild(loader);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    try {
      const res = await fetch(`${API_BASE}/chat/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: val })
      });
      const data = await res.json();
      
      document.getElementById(loadingId).remove();

      if (!res.ok) throw new Error(data.error || "Unknown error connecting to AI.");
      
      appendMessage(data.response, false);
    } catch (err) {
      if (document.getElementById(loadingId)) document.getElementById(loadingId).remove();
      appendMessage(`Error: ${err.message}`, false);
    } finally {
      sendBtn.disabled = false;
      quickAdviceBtn.disabled = false;
    }
  });

  chatInput.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') sendBtn.click();
  });
</script>
</body>
</html>
